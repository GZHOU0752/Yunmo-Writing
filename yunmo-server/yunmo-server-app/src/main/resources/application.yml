server:
  port: 8080

spring:
  application:
    name: yunmo-server
  codec:
    max-in-memory-size: 100MB
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:yunmo}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:yunmo}
    password: ${MYSQL_PASSWORD:yunmo123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  liquibase:
    enabled: false
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      timeout: 5000ms
      client-type: jedis
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

management:
  health:
    redis:
      enabled: false

yunmo:
  app:
    secret-key: ${MOLU_SECRET_KEY}
    chroma-url: ${CHROMA_URL:http://localhost:8000}
    redis-url: ${REDIS_URL:redis://localhost:6379/0}
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
    default-user-id: "00000000-0000-0000-0000-000000000000"
    max-retries: 3
    context-token-budget: 46000
  pipeline:
    # 管线阶段顺序（按此顺序执行）。注释掉则按插件优先级自动排序。
    stages:
      - assemble_context
      - debate_outline
      - preflight
      - pleasure_beat
      - write_chapter
      - polish_chapter
      - adversarial_edit
    # 禁用的阶段（不会在管线中执行）
    disabled: []
  llm:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${DEEPSEEK_API_BASE:https://api.deepseek.com}
      model: deepseek-v4-pro
    kimi:
      api-key: ${KIMI_API_KEY}
      base-url: ${KIMI_API_BASE:https://api.moonshot.cn/v1}
      model: kimi-k2-0719
    qwen:
      api-key: ${QWEN_API_KEY}
      base-url: ${QWEN_API_BASE:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model: qwen-plus

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.yunmo: DEBUG
    reactor.netty: INFO

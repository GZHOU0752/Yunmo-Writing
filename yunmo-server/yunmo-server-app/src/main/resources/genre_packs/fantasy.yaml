# 奇幻体裁规则包
genre_id: fantasy
name: 奇幻

core_promises:
  - "魔法/能力的规则一经建立必须自洽——不能为剧情便利打破规则"
  - "世界构建需要有内在逻辑——种族/势力/历史之间有可追溯的因果关系"
  - "主角的成长不只是变强——还包括对世界真相的理解深化"
  - "魔法/能力的代价与威力成正比——越强大的能力代价越重"

forbidden_patterns:
  - pattern: "万能魔法"
    reason: "魔法可以解决一切问题——缺乏限制消解戏剧张力"
  - pattern: "种族脸谱化"
    reason: "精灵=优雅、矮人=暴躁、兽人=野蛮——需要打破刻板印象"
  - pattern: "龙与地下城套皮"
    reason: "换个名字就是标准西幻模板——需要独特的原创设定"
  - pattern: "魔法学院日常化"
    reason: "上课下课考试的日常冲淡主线——背景设定不能代替情节推进"

chapter_rhythm: "魔法战斗场景用感官细节（光/热/声/气味）增强临场感。世界构建信息分散到情节中，禁止大段百科式说明。每章至少有一次'魔法感'的展示——让读者感受到这个世界的不同。"

continuity_checks:
  - "魔法体系的规则全文一致——同一法术的效果描述不可前后矛盾"
  - "种族能力设定一致——精灵的夜视/矮人的锻造等特性不可时有时无"
  - "世界地理和旅行时间合理——地图尺度与行程时间匹配"
  - "神器/魔法物品有使用记录——不可凭空出现或消失"

reader_pull_rules:
  - "世界真相的逐步揭露是最强追读动力"
  - "魔法突破/获得新能力/解锁神器后立即展示效果"
  - "史诗感和个人命运的交织——大事件要落到具体角色的选择上"

character_archetypes:
  - archetype: "命定之子"
    traits: "被预言选中但最初对此一无所知或拒绝接受"
  - archetype: "智慧导师"
    traits: "掌握世界真相的关键人物，有自己的弱点和局限性"
  - archetype: "异族盟友"
    traits: "来自不同种族的伙伴，带来不同视角和文化冲突"
  - archetype: "黑暗君主"
    traits: "不是纯粹邪恶，有可理解的动机和悲剧性背景"

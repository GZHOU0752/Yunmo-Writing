# 悬疑/灵异体裁规则包
genre_id: mystery
name: 悬疑/灵异

core_promises:
  - "每个疑点最终必须有合理解释——可以留白但不能烂尾"
  - "线索分布均匀且可回溯——读者返回去翻前文能发现早有暗示"
  - "恐怖感来自反常细节而非夸张渲染——日常场景异化强于血淋淋"
  - "角色智商在线——不能靠角色突然变傻或强行降智推动悬疑"

forbidden_patterns:
  - pattern: "真相是梦/幻觉"
    reason: "前面的所有疑点用一场梦解释——最令读者愤怒的结局"
  - pattern: "毫无铺垫的真凶"
    reason: "真凶是前文从未出现的路人——破坏了悬疑的可回溯性"
  - pattern: "角色独白解释谜团"
    reason: "真凶在最后一章用长篇独白解释一切——最懒的揭晓方式"
  - pattern: "灵异无规则"
    reason: "鬼/怪的能力和限制随心所欲——需要建立可验证的超自然规则"

chapter_rhythm: "悬疑章节的信息释放需有节奏——每章揭示1个关键信息同时埋下1个新疑点。紧张场景用短句和反常细节营造不安感。每1500字至少一次认知更新（角色或读者意识到之前的理解有误）。"

continuity_checks:
  - "所有已揭示线索在全文中保持一致——不能前后矛盾"
  - "角色的信息边界清晰——不能基于不知道的信息行动"
  - "时间线精确——悬疑题材对时间线最敏感"
  - "物品/证物的状态前后一致"

reader_pull_rules:
  - "章末落点是认知更新——'你以为的，全错了'比'更大的恐怖来了'更有效"
  - "每3-5章给一次阶段性答案，同时升级谜团"
  - "信息释放时机——在读者以为就是这样了的时候多翻一层"

character_archetypes:
  - archetype: "侦探/调查者"
    traits: "有敏锐观察力和推理能力，但自身也有盲点和偏见"
  - archetype: "关键证人"
    traits: "掌握关键信息但出于某种原因不能或不愿全盘托出"
  - archetype: "红鲱鱼/烟雾弹"
    traits: "看似可疑实则无辜，用于转移读者注意力"
  - archetype: "幕后推手"
    traits: "在前30%内容中被暗示或出场，不是凭空出现的路人"

# 通用体裁规则包（都市/轻小说/短篇等共用）
genre_id: generic
name: 通用

core_promises:
  - "人物行为有可追溯的动机链——不能为剧情便利改变角色性格"
  - "情节因果链完整——每个事件有前因后果，不能凭空发生"
  - "信息释放有节奏——不一次灌完世界观，不拖到结尾才解释关键设定"
  - "每章至少有一个局势或关系的变化——禁止纯过渡章节"

forbidden_patterns:
  - pattern: "角色降智推动剧情"
    reason: "角色忽然做出不符合设定的愚蠢选择以推动情节——最常见也最令读者愤怒"
  - pattern: "巧合过多"
    reason: "关键情节依赖巧合而非角色主动选择——连续巧合超过2次即警告"
  - pattern: "背景板设定"
    reason: "设定了但从未影响剧情的规则/能力/关系——要么利用要么删除"
  - pattern: "万能金手指"
    reason: "主角的能力没有代价或限制——需要明确每次使用的成本"

chapter_rhythm: "开篇200字必须有冲突或悬念。每章800-1200字内至少一次局势变化。段落长度有节奏感——短段制造冲击，中段推进叙事，偶尔长段做深度描写。"

continuity_checks:
  - "角色伤势/状态前后一致"
  - "时间线推进合理——不出现时间跳跃但事件密度不匹配"
  - "物品和资源的持有状态一致"
  - "角色关系变化有事件支撑——不能上一章刚认识下一章就生死之交"

reader_pull_rules:
  - "章末用具体画面或台词制造钩子，不用情绪总结"
  - "主角每章至少一个主动选择，不能全程被动应对"
  - "读者知道的和角色知道的之间存在信息差是有效的追读工具"

character_archetypes:
  - archetype: "成长型主角"
    traits: "从弱到强，每一步成长有清晰的付出和收获"
  - archetype: "亦敌亦友的对手"
    traits: "不是纯粹的反派，有独立的目标和可理解的动机"
  - archetype: "智慧型辅助"
    traits: "提供信息或能力支持，但有自己的限制和边界"

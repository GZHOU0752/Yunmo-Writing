# 武侠体裁规则包
genre_id: wuxia
name: 武侠

core_promises:
  - "武功体系有明确层级和修习条件，不可随意获得绝世武功"
  - "内力/真气有限度，不能无限使用——战斗有消耗感和代价"
  - "江湖有江湖的规矩——门派、世家、朝廷、绿林之间的关系逻辑自洽"
  - "武学境界提升需要悟性和实战，不是靠吃药或奇遇堆砌"

forbidden_patterns:
  - pattern: "武功通货膨胀"
    reason: "前期珍稀如宝的武功后期烂大街——需保持武学稀缺性梯度"
  - pattern: "内力无限"
    reason: "主角内力无底洞，连战数场毫无疲态——消解战斗紧张感"
  - pattern: "朝廷/官府无存在感"
    reason: "江湖人物横行无忌却从无官府介入——需交代朝廷与江湖的权力边界"
  - pattern: "招式名称花哨无实质"
    reason: "招式只有名字没有效果差异——每招应有可辨识的功能和限制"

chapter_rhythm: "打斗场景用短句和动词驱动，3-5句后换节奏。每场打斗有明确的胜负条件和代价。恩怨情仇的铺陈节奏可较舒缓，但每章至少有一个人际关系或局势的变化。"

continuity_checks:
  - "武功招式的效果描述前后一致，同一招不能上次破甲这次只擦皮"
  - "伤势恢复符合设定的时间线——内伤需要运功疗伤，外伤需要金疮药+时间"
  - "角色武功境界变化有清晰轨迹——何人何时何招式突破"
  - "门派/帮派/世家的势力范围前后一致"

reader_pull_rules:
  - "武功突破和绝世武功的获得是强钩子"
  - "恩怨真相的逐步揭露是核心追读驱动力"
  - "正派反派的立场转换需充分铺垫——黑化或洗白不能一蹴而就"

character_archetypes:
  - archetype: "初出茅庐少侠"
    traits: "武功低微但天资过人，性格冲动但心存正义"
  - archetype: "隐世高手"
    traits: "曾经叱咤风云后隐居，有不可告人的过去和未了心愿"
  - archetype: "魔教/邪派高手"
    traits: "行事不循常规但有自己的道义准则，不可脸谱化"
  - archetype: "江湖侠女"
    traits: "武功不俗、性格鲜明，有独立于男主角的故事线"

# 修仙/玄幻体裁规则包
genre_id: xianxia
name: 修仙/玄幻

# ===== 核心承诺 =====
core_promises:
  - "主角修炼路径清晰可追踪，每个境界突破有明确契机、代价和能力变化"
  - "战力体系自洽——境界间战力差距在全文保持一致，不因剧情随意缩涨"
  - "机缘与努力合理配比——主角不能仅靠运气，每次重大突破需自身努力或合理代价"
  - "天材地宝/功法/法宝有稀缺性梯度，不可无限供应使战斗失去悬念"
  - "世界观力量规则一经建立，不可随意违背或添加例外"

# ===== 禁用模式 =====
forbidden_patterns:
  - pattern: "境界随意跨越"
    reason: "前面建立的境界壁垒被无视，直接跳过若干境界——战力体系崩溃第一信号"
  - pattern: "无敌流无代价"
    reason: "主角从头碾压到尾，没有真正危机——修仙读者核心爽点来自成长的艰辛和突破的快感"
  - pattern: "女角全员后宫化"
    reason: "每个女性角色唯一存在意义是倾慕主角，缺乏独立人格——严重消耗读者耐心"
  - pattern: "重复副本/套路"
    reason: "连续3个以上结构相同的秘境/副本/打脸情节——修仙读者对此尤为敏感"
  - pattern: "天劫无实质威胁"
    reason: "渡劫应是修仙世界最危险的环节，若每次有惊无险轻松度过则消解世界观紧张感"

# ===== 章节节奏 =====
chapter_rhythm: "日常修炼章节节奏可较舒缓，但每3-5章需安排事件打破平静。境界突破章节节奏加速，用短句和动作描写增强紧张感。战斗章节描写密度高，回合制不超过3回合后应有变化。"

# ===== 连续性检查 =====
continuity_checks:
  - "境界名称和层级全文一致（筑基→金丹→元婴 顺序不乱）"
  - "功法/神通效果描述前后一致"
  - "储物袋/空间戒指物品清单一致，重要物品不能凭空出现或消失"
  - "伤势恢复时间与设定匹配，重伤不能下一章完好如初"
  - "传送阵/飞行速度/赶路时间符合已建立的空间尺度"

# ===== 追读法则 =====
reader_pull_rules:
  - "境界突破是全章最强钩子——在突破即将完成的瞬间断章"
  - "每次获得新能力/法宝后，1-3章内展示实际效果，满足读者试刀期待"
  - "爽点与虐点配比建议 3:1——修仙读者追求爽感为主"
  - "道友/同门的认可或被打脸后的震惊是重要情绪奖励，但频率不宜过高"

# ===== 角色原型 =====
character_archetypes:
  - archetype: "废柴/凡人主角"
    traits: "起点极低但拥有隐藏资质或逆天机缘。性格坚韧、不轻言放弃"
  - archetype: "老爷爷/戒灵"
    traits: "提供修炼指导但不直接出手。有自身未了心愿和限制，最终需离开或被主角超越"
  - archetype: "护短师尊"
    traits: "有强大实力和鲜明个性。对徒弟真心关爱但不溺爱"
  - archetype: "宿命对手"
    traits: "与主角势均力敌的竞争者，亦敌亦友，有独立且可理解的动机"
